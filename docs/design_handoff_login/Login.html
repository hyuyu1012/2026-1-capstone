<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>안심 케어 · 로그인</title>
<link rel="stylesheet" href="wanted/colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #f1f0ec;
    font-family: var(--font-sans);
    color: var(--label-normal);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .stage { padding: 40px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="stage">
  <div id="mount"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="android-frame.jsx"></script>

<script type="text/babel">
// ─── Logos ─────────────────────────────────────────────────────────
const KakaoLogo = ({ size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
    <path d="M12 4.5C7.03 4.5 3 7.65 3 11.55c0 2.43 1.6 4.56 4.03 5.83l-.83 3.03c-.08.27.23.49.47.34l3.66-2.4c.55.07 1.1.11 1.67.11 4.97 0 9-3.15 9-7.04 0-3.89-4.03-7.92-9-7.92Z" fill="#191600"/>
  </svg>
);
const GoogleLogo = ({ size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24">
    <path d="M21.6 12.23c0-.74-.07-1.45-.19-2.13H12v4.03h5.39c-.23 1.24-.94 2.29-2 3v2.5h3.23c1.89-1.74 2.98-4.3 2.98-7.4z" fill="#4285F4"/>
    <path d="M12 22c2.7 0 4.96-.9 6.62-2.42l-3.23-2.5c-.9.6-2.04.96-3.39.96-2.6 0-4.81-1.76-5.6-4.12H3.06v2.58A10 10 0 0 0 12 22z" fill="#34A853"/>
    <path d="M6.4 13.92A6.02 6.02 0 0 1 6.08 12c0-.67.12-1.32.32-1.92V7.5H3.06A10 10 0 0 0 2 12c0 1.61.39 3.14 1.06 4.5l3.34-2.58z" fill="#FBBC05"/>
    <path d="M12 5.96c1.47 0 2.79.5 3.83 1.5l2.86-2.86C16.95 2.99 14.7 2 12 2A10 10 0 0 0 3.06 7.5L6.4 10.08c.79-2.36 3-4.12 5.6-4.12z" fill="#EA4335"/>
  </svg>
);
const AppleLogo = ({ size = 18, color = '#fff' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
    <path d="M17.05 12.04c-.03-2.6 2.13-3.85 2.22-3.91-1.21-1.77-3.09-2.01-3.76-2.04-1.6-.16-3.12.94-3.93.94-.81 0-2.06-.92-3.4-.89-1.75.03-3.37 1.02-4.27 2.58C2 12.04 3.4 17 5.27 19.7c.92 1.32 2 2.8 3.43 2.75 1.38-.05 1.9-.89 3.57-.89 1.67 0 2.14.89 3.6.86 1.49-.03 2.43-1.34 3.34-2.67 1.05-1.53 1.48-3.02 1.5-3.1-.03-.01-2.88-1.1-2.91-4.36zM14.6 4.41c.74-.9 1.24-2.14 1.1-3.38-1.07.04-2.36.71-3.13 1.6-.69.8-1.29 2.07-1.13 3.28 1.19.1 2.42-.6 3.16-1.5z"/>
  </svg>
);
const MailIcon = ({ size = 18, color = '#fff' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="5" width="18" height="14" rx="2.5"/>
    <path d="M3.5 6.5l8.5 6 8.5-6"/>
  </svg>
);

// ─── Brand mark ────────────────────────────────────────────────────
function BrandMark() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 18 }}>
      <div style={{
        width: 64, height: 64, borderRadius: 22,
        background: 'var(--primary-normal)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: '0 10px 24px rgba(0,102,255,0.22)',
      }}>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 3 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6z"/>
          <path d="M9 12.5l2.2 2.2L15.5 10"/>
        </svg>
      </div>
      <div style={{ textAlign: 'center' }}>
        <h1 style={{
          margin: 0, fontSize: 26, fontWeight: 700, letterSpacing: '-0.022em',
          color: 'var(--label-strong)', lineHeight: 1.2,
        }}>안심 케어</h1>
        <p style={{
          margin: '8px 0 0', fontSize: 14, color: 'var(--label-neutral)',
          lineHeight: 1.5, fontWeight: 500,
        }}>부모님의 하루를 함께 챙깁니다.</p>
      </div>
    </div>
  );
}

// ─── Social / email buttons ────────────────────────────────────────
function AuthButton({ bg, color = '#fff', border, icon, label, onClick, primary }) {
  return (
    <button onClick={onClick} style={{
      width: '100%', height: 52, borderRadius: 12,
      background: bg, color: color,
      border: border || 'none',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: 10, cursor: 'pointer',
      fontFamily: 'var(--font-sans)',
      fontSize: 15, fontWeight: 700, letterSpacing: '-0.005em',
      boxShadow: primary ? '0 4px 12px rgba(0,102,255,0.18)' : 'none',
      transition: 'transform 120ms var(--ease-standard), box-shadow 120ms',
    }}
    onMouseDown={e => e.currentTarget.style.transform = 'scale(0.98)'}
    onMouseUp={e => e.currentTarget.style.transform = ''}
    onMouseLeave={e => e.currentTarget.style.transform = ''}>
      <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 20 }}>{icon}</span>
      <span>{label}</span>
    </button>
  );
}

// ─── Login screen ──────────────────────────────────────────────────
function Login() {
  const [status, setStatus] = React.useState(null); // {provider, label}
  const [showEmail, setShowEmail] = React.useState(false);

  const choose = (provider, label) => {
    setStatus({ provider, label });
    setTimeout(() => setStatus(null), 2400);
  };

  if (showEmail) return <EmailLogin onBack={() => setShowEmail(false)} />;

  return (
    <AndroidDevice width={360} height={760}>
      <div style={{
        height: '100%', background: '#fff',
        display: 'flex', flexDirection: 'column',
        fontFamily: 'var(--font-sans)',
      }}>
        {/* Brand area */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '32px 28px 16px' }}>
          <BrandMark />
        </div>

        {/* Buttons */}
        <div style={{ padding: '0 24px 12px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          <AuthButton
            bg="#FEE500" color="#191600"
            icon={<KakaoLogo />}
            label="카카오로 시작하기"
            onClick={() => choose('kakao', '카카오')}
          />
          <AuthButton
            bg="#fff" color="var(--label-strong)"
            border="1px solid var(--line-normal-normal)"
            icon={<GoogleLogo />}
            label="Google로 시작하기"
            onClick={() => choose('google', 'Google')}
          />
          <AuthButton
            bg="#000" color="#fff"
            icon={<AppleLogo color="#fff" />}
            label="Apple로 시작하기"
            onClick={() => choose('apple', 'Apple')}
          />

          {/* Divider */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0' }}>
            <div style={{ flex: 1, height: 1, background: 'var(--line-normal-neutral)' }}/>
            <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--label-alternative)', letterSpacing: '0.06em' }}>또는</span>
            <div style={{ flex: 1, height: 1, background: 'var(--line-normal-neutral)' }}/>
          </div>

          <AuthButton
            bg="var(--primary-normal)" color="#fff"
            icon={<MailIcon color="#fff" />}
            label="이메일로 시작하기"
            primary
            onClick={() => setShowEmail(true)}
          />
        </div>

        {/* Footer */}
        <div style={{ padding: '8px 28px 24px', textAlign: 'center' }}>
          <p style={{
            margin: 0, fontSize: 11, lineHeight: 1.55, color: 'var(--label-alternative)',
            fontWeight: 500,
          }}>
            계속 진행 시 <span style={{ color: 'var(--label-neutral)', fontWeight: 600 }}>이용약관</span> 및{' '}
            <span style={{ color: 'var(--label-neutral)', fontWeight: 600 }}>개인정보 처리방침</span>에 동의합니다.
          </p>
        </div>

        {/* Toast */}
        {status && <Toast label={status.label} />}
      </div>
    </AndroidDevice>
  );
}

// ─── Toast ─────────────────────────────────────────────────────────
function Toast({ label }) {
  return (
    <div style={{
      position: 'absolute', left: '50%', bottom: 96, transform: 'translateX(-50%)',
      background: 'var(--label-strong)', color: '#fff',
      padding: '10px 16px', borderRadius: 999,
      fontSize: 13, fontWeight: 600, letterSpacing: '-0.005em',
      boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
      animation: 'toastIn 240ms var(--ease-standard)',
      whiteSpace: 'nowrap', zIndex: 10,
    }}>
      {label}로 로그인하는 중…
      <style>{`
        @keyframes toastIn {
          from { opacity: 0; transform: translate(-50%, 8px); }
          to   { opacity: 1; transform: translate(-50%, 0); }
        }
      `}</style>
    </div>
  );
}

// ─── Email login (secondary screen) ────────────────────────────────
function EmailLogin({ onBack }) {
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const valid = email.includes('@') && pw.length >= 6;

  return (
    <AndroidDevice width={360} height={760}>
      <div style={{
        height: '100%', background: '#fff',
        display: 'flex', flexDirection: 'column',
        fontFamily: 'var(--font-sans)',
      }}>
        {/* Top bar */}
        <div style={{ padding: '8px 8px 0', display: 'flex', alignItems: 'center' }}>
          <button onClick={onBack} aria-label="뒤로" style={{
            width: 40, height: 40, borderRadius: 999, border: 'none',
            background: 'transparent', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'var(--label-strong)',
          }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </button>
        </div>

        <div style={{ flex: 1, padding: '20px 28px 0', display: 'flex', flexDirection: 'column' }}>
          <h1 style={{
            margin: 0, fontSize: 24, fontWeight: 700, letterSpacing: '-0.022em',
            color: 'var(--label-strong)', lineHeight: 1.25,
          }}>이메일로 로그인</h1>
          <p style={{
            margin: '6px 0 0', fontSize: 13.5, color: 'var(--label-neutral)',
            lineHeight: 1.5, fontWeight: 500,
          }}>가입한 이메일과 비밀번호를 입력하세요.</p>

          {/* Form */}
          <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Field label="이메일" type="email" value={email} onChange={setEmail} placeholder="name@example.com" />
            <Field label="비밀번호" type="password" value={pw} onChange={setPw} placeholder="6자 이상" />
          </div>

          <div style={{ marginTop: 14, display: 'flex', justifyContent: 'flex-end' }}>
            <button style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              fontSize: 12.5, fontWeight: 600, color: 'var(--label-neutral)',
              padding: 0,
            }}>비밀번호를 잊으셨나요?</button>
          </div>

          <div style={{ flex: 1 }} />

          <button disabled={!valid} style={{
            width: '100%', height: 52, marginTop: 16, borderRadius: 12, border: 'none',
            background: valid ? 'var(--primary-normal)' : 'var(--fill-neutral)',
            color: valid ? '#fff' : 'var(--label-alternative)',
            fontSize: 15, fontWeight: 700, letterSpacing: '-0.005em',
            cursor: valid ? 'pointer' : 'not-allowed',
            transition: 'background 150ms',
          }}>로그인</button>

          <div style={{ padding: '14px 0 24px', textAlign: 'center' }}>
            <span style={{ fontSize: 13, color: 'var(--label-neutral)', fontWeight: 500 }}>아직 계정이 없으신가요? </span>
            <button style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              fontSize: 13, fontWeight: 700, color: 'var(--primary-normal)', padding: 0,
            }}>회원가입</button>
          </div>
        </div>
      </div>
    </AndroidDevice>
  );
}

function Field({ label, type, value, onChange, placeholder }) {
  const [focus, setFocus] = React.useState(false);
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      <span style={{
        fontSize: 11.5, fontWeight: 700, color: 'var(--label-neutral)', letterSpacing: '0.04em',
      }}>{label}</span>
      <input
        type={type}
        value={value}
        placeholder={placeholder}
        onChange={(e) => onChange(e.target.value)}
        onFocus={() => setFocus(true)}
        onBlur={() => setFocus(false)}
        style={{
          height: 50, padding: '0 14px', borderRadius: 12,
          border: '1px solid ' + (focus ? 'var(--primary-normal)' : 'var(--line-normal-normal)'),
          background: '#fff',
          fontFamily: 'var(--font-sans)', fontSize: 15, fontWeight: 500,
          color: 'var(--label-strong)',
          outline: 'none',
          boxShadow: focus ? '0 0 0 3px rgba(0,102,255,0.10)' : 'none',
          transition: 'border 120ms, box-shadow 120ms',
        }}
      />
    </label>
  );
}

ReactDOM.createRoot(document.getElementById('mount')).render(<Login />);
</script>

</body>
</html>
